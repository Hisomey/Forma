<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Forma</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@200;300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #5a9464;
  --bg2:   #4e8458;
  --card:  #3d6b45;
  --deep:  #2a4d30;
  --cream: #f2f0e8;
  --cream2:#ddd9c8;
  --muted: rgba(242,240,232,0.45);
  --bdr:   rgba(242,240,232,0.12);
  --bdr2:  rgba(242,240,232,0.22);
  --shd:   rgba(30,55,34,0.35);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--cream);
  font-family:'Jost',sans-serif;
  min-height:100dvh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 0%,rgba(255,255,255,0.06) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 100%,rgba(0,0,0,0.12) 0%,transparent 60%);
}
.screen{display:none;flex-direction:column;min-height:100dvh;position:relative;z-index:1;}
#home.screen{min-height:auto;height:auto;}
.screen.active{display:flex;}

/* ── HOME ── */
#home{padding:calc(var(–safe-t) + 32px) 24px calc(var(–safe-b) + 40px);}

.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:44px;}
.logo{
font-family:‘Cormorant Garamond’,serif;
font-size:32px;font-style:italic;font-weight:600;
color:var(–cream);letter-spacing:1px;
}

.logo-img{height:46px;width:auto;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(30,55,34,0.2));}
.streak-pill{
display:flex;align-items:center;gap:6px;
background:rgba(42,77,48,0.55);border:1px solid var(–bdr2);
backdrop-filter:blur(10px);
color:var(–cream2);font-size:11px;font-weight:400;letter-spacing:0.5px;
padding:7px 14px;border-radius:100px;
}

.hero{margin-bottom:36px;}
.hero-eyebrow{font-size:9px;font-weight:500;letter-spacing:4px;color:var(–muted);text-transform:uppercase;margin-bottom:12px;}
.hero-title{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(54px,17vw,76px);font-weight:700;
line-height:0.87;letter-spacing:-1px;color:var(–cream);margin-bottom:12px;
}
.hero-title em{font-style:italic;color:var(–cream2);}
.hero-sub{font-size:11px;font-weight:300;color:var(–muted);letter-spacing:2.5px;text-transform:uppercase;}

.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:28px;}
.wday{display:flex;flex-direction:column;align-items:center;gap:5px;}
.wday-l{font-size:8px;font-weight:500;letter-spacing:1.5px;color:var(–muted);text-transform:uppercase;}
.wdot{
width:34px;height:34px;border-radius:10px;
display:flex;align-items:center;justify-content:center;
font-size:14px;
background:rgba(61,107,69,0.45);border:1px solid var(–bdr);
transition:all .25s;
}
.wdot.today{background:var(–deep);border:1px solid var(–bdr2);font-size:9px;font-weight:700;color:var(–cream);box-shadow:0 4px 16px var(–shd);}
.wdot.rest{opacity:.3;}

.s-card{
background:linear-gradient(150deg,rgba(61,107,69,0.92),rgba(42,77,48,0.92));
border:1px solid var(–bdr2);border-radius:24px;padding:24px;
margin-bottom:20px;
box-shadow:0 8px 32px var(–shd),inset 0 1px 0 rgba(242,240,232,0.1);
position:relative;overflow:hidden;
}
.s-card::after{
content:’’;position:absolute;top:0;left:24px;right:24px;height:1px;
background:linear-gradient(90deg,transparent,rgba(242,240,232,0.28),transparent);
}
.c-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.c-icon{
width:50px;height:50px;border-radius:13px;
background:rgba(242,240,232,0.08);border:1px solid var(–bdr);
display:flex;align-items:center;justify-content:center;font-size:24px;
}
.c-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.c-dur{
font-family:‘DM Mono’,monospace;font-size:11px;color:var(–cream2);
background:rgba(242,240,232,0.07);border:1px solid var(–bdr);
padding:3px 9px;border-radius:5px;
}
.c-cnt{font-size:9px;color:var(–muted);letter-spacing:1px;}
.c-title{
font-family:‘Cormorant Garamond’,serif;
font-size:38px;font-weight:700;letter-spacing:-0.5px;
color:var(–cream);line-height:1;margin-bottom:4px;
}
.c-muscles{font-size:10px;font-weight:300;color:var(–muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:18px;}
.divider{height:1px;background:var(–bdr);margin-bottom:16px;}
.ex-list{display:flex;flex-direction:column;gap:11px;}

.ex-row{display:flex;align-items:center;gap:12px;}
.ex-i{font-family:‘DM Mono’,monospace;font-size:9px;color:var(–muted);width:16px;flex-shrink:0;letter-spacing:1px;}
.ex-bar{width:1.5px;height:18px;border-radius:1px;background:rgba(242,240,232,0.18);flex-shrink:0;}
.ex-n{font-size:13px;font-weight:400;flex:1;color:var(–cream);}
.ex-v{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–muted);background:rgba(242,240,232,0.06);padding:2px 8px;border-radius:4px;}

/* Step dots progress */
.step-dots{display:flex;gap:4px;justify-content:center;margin-top:5px;}
.step-dot{width:5px;height:5px;border-radius:50%;background:rgba(61,107,69,0.8);border:1px solid rgba(242,240,232,0.2);transition:all .4s;}
.step-dot.done-step{background:var(–cream2);border-color:var(–cream2);}
.step-dot.cur-step{background:var(–cream);border-color:var(–cream);width:14px;border-radius:3px;}

/* Completed day dot */
.wdot.completed{
background:rgba(42,77,48,0.7);
border:1px solid var(–cream2);
color:var(–cream2);
font-size:13px;
}

/* Prog header with exercise name */
.prog-ex-name{font-size:10px;font-weight:400;color:var(–cream);letter-spacing:0.5px;text-align:center;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-start{
width:100%;padding:20px;border-radius:18px;border:none;cursor:pointer;
background:var(–deep);color:var(–cream);
font-family:‘Jost’,sans-serif;font-size:12px;font-weight:500;
letter-spacing:3.5px;text-transform:uppercase;
box-shadow:0 4px 20px var(–shd),inset 0 1px 0 rgba(242,240,232,0.07);
transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden;
}
.btn-start::before{content:’’;position:absolute;inset:0;background:linear-gradient(135deg,rgba(242,240,232,0.04),transparent);}
.btn-start:active{transform:scale(.97);box-shadow:0 2px 10px var(–shd);}
.btn-start.rest{background:rgba(61,107,69,0.35);color:var(–muted);border:1px solid var(–bdr);cursor:default;box-shadow:none;}

/* ── WORKOUT ── */
#workout{background:var(–bg);}

.w-hdr{
padding:calc(var(–safe-t) + 18px) 20px 18px;
display:flex;align-items:center;gap:14px;
background:rgba(90,148,100,0.75);backdrop-filter:blur(14px);
border-bottom:1px solid var(–bdr);position:sticky;top:0;z-index:10;
}
.btn-ico{
width:38px;height:38px;border-radius:11px;
background:rgba(61,107,69,0.65);border:1px solid var(–bdr2);
color:var(–cream);font-size:13px;cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-shrink:0;
transition:background .15s;
}
.btn-ico:active{background:var(–deep);}
.prog-wrap{flex:1;}
.prog-lbl{font-size:9px;font-weight:400;letter-spacing:2.5px;color:var(–muted);text-transform:uppercase;text-align:center;margin-bottom:6px;}
.prog-track{height:3px;background:rgba(61,107,69,0.8);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(–cream2);border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(221,217,200,0.5);}
.btn-quit{background:rgba(42,77,48,0.55);border:1px solid var(–bdr);color:var(–muted);padding:6px 12px;border-radius:9px;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;flex-shrink:0;}

.w-body{flex:1;display:flex;flex-direction:column;padding:24px 20px;gap:20px;overflow-y:auto;}

.phase-tag{
display:inline-flex;align-items:center;gap:7px;
padding:5px 13px;border-radius:100px;
font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;
align-self:flex-start;transition:all .3s;
}
.pt-work{background:rgba(42,77,48,0.55);border:1px solid var(–bdr2);color:var(–cream2);}
.pt-rest{background:rgba(168,212,160,0.12);border:1px solid rgba(168,212,160,0.28);color:#a8d4a0;}
.pt-prep{background:rgba(242,240,232,0.07);border:1px solid var(–bdr2);color:var(–muted);}
.pt-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

.ex-headline{display:flex;flex-direction:column;gap:5px;}
.ex-meta{font-size:9px;font-weight:400;color:var(–muted);letter-spacing:2px;text-transform:uppercase;}
.ex-big{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(36px,10vw,50px);font-weight:700;
line-height:1;letter-spacing:-0.5px;color:var(–cream);
}

.sdots{display:flex;gap:5px;align-items:center;}
.sdot{height:4px;border-radius:2px;background:rgba(242,240,232,0.15);transition:all .35s cubic-bezier(.4,0,.2,1);}
.sdot.done{background:var(–cream2);}
.sdot.cur{background:var(–cream);}

.ring-sec{display:flex;flex-direction:column;align-items:center;gap:20px;padding:4px 0;}
.ring-wrap{position:relative;width:200px;height:200px;}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.ring-track{fill:none;stroke:rgba(42,77,48,0.7);stroke-width:5;}
.ring-prog{
fill:none;stroke:var(–cream);stroke-width:5;stroke-linecap:round;
stroke-dasharray:530.97;
transition:stroke-dashoffset 1s linear,stroke .4s;
}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.ring-num{font-family:‘DM Mono’,monospace;font-size:52px;font-weight:400;color:var(–cream);letter-spacing:-3px;line-height:1;}
.ring-tag{font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(–muted);}

.chips{display:flex;gap:8px;justify-content:center;}
.chip{background:rgba(42,77,48,0.45);border:1px solid var(–bdr);border-radius:13px;padding:11px 18px;text-align:center;min-width:72px;}
.chip-v{font-family:‘DM Mono’,monospace;font-size:20px;font-weight:400;color:var(–cream);line-height:1;}
.chip-l{font-size:8px;font-weight:400;letter-spacing:2px;color:var(–muted);text-transform:uppercase;margin-top:3px;}

.desc-box{
background:rgba(42,77,48,0.38);border:1px solid var(–bdr);
border-radius:16px;padding:16px;
font-size:13px;font-weight:300;color:rgba(242,240,232,0.6);line-height:1.7;
}

.next-box{
display:flex;align-items:center;gap:14px;
background:rgba(42,77,48,0.28);border:1px solid var(–bdr);
border-radius:14px;padding:13px 16px;
}
.next-arr{font-size:14px;color:var(–muted);}
.next-lbl{font-size:8px;font-weight:400;letter-spacing:3px;color:var(–muted);text-transform:uppercase;margin-bottom:3px;}
.next-nm{font-size:14px;font-weight:400;color:var(–cream);}

.w-ctrls{padding:0 20px calc(var(–safe-b) + 32px);display:flex;flex-direction:column;gap:10px;}
.btn-act{
width:100%;padding:20px;border-radius:18px;border:none;cursor:pointer;
background:var(–deep);color:var(–cream);
font-family:‘Jost’,sans-serif;font-size:12px;font-weight:500;
letter-spacing:3.5px;text-transform:uppercase;
box-shadow:0 4px 20px var(–shd),inset 0 1px 0 rgba(242,240,232,0.07);
transition:transform .15s,box-shadow .15s;
}
.btn-act:active{transform:scale(.97);}
.btn-act.rest-act{
background:rgba(168,212,160,0.12);
border:1px solid rgba(168,212,160,0.22);
color:#a8d4a0;box-shadow:none;
}

/* ── FINISH ── */
#finish{
align-items:center;justify-content:center;
padding:48px 24px calc(var(–safe-b) + 48px);
text-align:center;gap:24px;
}
.f-icon{
width:82px;height:82px;border-radius:22px;
background:var(–deep);border:1px solid var(–bdr2);
display:flex;align-items:center;justify-content:center;font-size:36px;
box-shadow:0 8px 32px var(–shd);
animation:popIn .55s cubic-bezier(.34,1.56,.64,1) forwards;
}
.f-title{
font-family:‘Cormorant Garamond’,serif;
font-size:54px;font-weight:700;line-height:0.92;
color:var(–cream);letter-spacing:-1px;
}
.f-title em{font-style:italic;color:var(–cream2);display:block;}
.f-sub{font-size:13px;font-weight:300;color:var(–muted);line-height:1.7;}
.f-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.f-stat{
background:rgba(42,77,48,0.45);border:1px solid var(–bdr);
border-radius:18px;padding:18px 8px;
box-shadow:0 4px 16px rgba(30,55,34,0.18);
}
.f-v{font-family:‘DM Mono’,monospace;font-size:28px;font-weight:400;color:var(–cream);line-height:1;}
.f-l{font-size:8px;font-weight:400;letter-spacing:2px;color:var(–muted);text-transform:uppercase;margin-top:5px;}
.btn-home{
width:100%;padding:20px;border-radius:18px;border:none;
background:var(–deep);color:var(–cream);
font-family:‘Jost’,sans-serif;font-size:12px;font-weight:500;
letter-spacing:3.5px;text-transform:uppercase;
box-shadow:0 4px 20px var(–shd);cursor:pointer;
transition:transform .15s;margin-top:4px;
}
.btn-home:active{transform:scale(.97);}

@keyframes popIn{
0%{transform:scale(0) rotate(-10deg);opacity:0;}
70%{transform:scale(1.08) rotate(2deg);opacity:1;}
100%{transform:scale(1) rotate(0);}
}
</style>

</head>

      <div class="ring-wrap">
        <svg viewBox="0 0 200 200">
          <circle class="ring-track" cx="100" cy="100" r="84.5"/>
          <circle class="ring-prog" id="ringProg" cx="100" cy="100" r="84.5"/>
        </svg>
        <div class="ring-in">
          <div class="ring-num" id="ringNum">—</div>
          <div class="ring-tag" id="ringTag">prêt ?</div>
        </div>
      </div>
      <div class="chips">
        <div class="chip"><div class="chip-v" id="chipR">—</div><div class="chip-l">Reps</div></div>
        <div class="chip"><div class="chip-v" id="chipS">—</div><div class="chip-l">Séries</div></div>
        <div class="chip"><div class="chip-v" id="chipP">—</div><div class="chip-l">Repos</div></div>
      </div>
    </div>
    <div class="desc-box" id="descBox">—</div>
    <div class="next-box" id="nextBox" style="display:none">
      <span class="next-arr">→</span>
      <div><div class="next-lbl">Ensuite</div><div class="next-nm" id="nextNm">—</div></div>
    </div>
  </div>
  <div class="w-ctrls">
    <button class="btn-act" id="btnAct" onclick="handleAction()">C'est parti</button>
  </div>
</div>

<!-- FINISH -->

<div id="finish" class="screen">
  <div class="f-icon">🏆</div>
  <div class="f-title">Séance<em>terminée.</em></div>
  <div class="f-sub" id="fSub">—</div>
  <div class="f-stats">
    <div class="f-stat"><div class="f-v" id="fEx">—</div><div class="f-l">Exercices</div></div>
    <div class="f-stat"><div class="f-v" id="fSer">—</div><div class="f-l">Séries</div></div>
    <div class="f-stat"><div class="f-v" id="fDur">—</div><div class="f-l">Durée</div></div>
  </div>
  <button class="btn-home" onclick="goHome()">Retour à l'accueil</button>
</div>

<script>
const DAYS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DS=['D','L','Ma','Me','J','V','S'];
const CIRC=2*Math.PI*84.5;

const PROG={
  1:{nom:'Push',emoji:'💪',muscles:'Poitrine · Épaules · Triceps',duree:'~50 min',
    exercices:[
      {nom:'Pompes classiques', series:4,reps:'15',     repos:75, timed:false,desc:"Mains à largeur d'épaules, corps gainé. Descends jusqu'à frôler le sol, remonte sans verrouiller les coudes. Ne laisse pas les hanches tomber."},
      {nom:'Pompes larges',     series:4,reps:'12',     repos:75, timed:false,desc:"Mains plus écartées que les épaules (1,5×). Coudes légèrement en diagonale. Cible l'extérieur du pectoral."},
      {nom:'Pompes diamant',    series:4,reps:'10',     repos:90, timed:false,desc:"Mains sous la poitrine en diamant. Descends en 2 secondes. Cible les triceps et la partie interne du pec."},
      {nom:'Pompes pike',       series:4,reps:'12',     repos:75, timed:false,desc:"Position en V inversé, hanches hautes. Descends la tête vers le sol en fléchissant les coudes. Imite le développé militaire."},
      {nom:'Dips sur chaise',   series:4,reps:'12',     repos:90, timed:false,desc:"Dos à une chaise solide, mains sur le bord, jambes tendues. Descends jusqu'à 90°, remonte. Triceps garantis."},
    ]},
  2:{nom:'Pull & Core',emoji:'🔥',muscles:'Dos · Biceps · Abdominaux',duree:'~55 min',
    exercices:[
      {nom:'Towel Row',          series:4,reps:'10',     repos:90, timed:false,desc:"Serviette autour d'une poignée de porte fermée. Pieds contre la porte, corps incliné. Tire ta poitrine en serrant les omoplates."},
      {nom:'Superman',           series:4,reps:'15',     repos:60, timed:false,desc:"Ventre au sol, bras tendus. Soulève bras et jambes simultanément. Contracte dos et fessiers. Tiens 2 secondes."},
      {nom:'Crunchs classiques', series:4,reps:'20',     repos:30, timed:false,desc:"Sur le dos, genoux fléchis, mains derrière la nuque. Monte les épaules en contractant les abdos. Expire en montant."},
      {nom:'Crunchs obliques',   series:4,reps:'15/côté',repos:30, timed:false,desc:"Amène le coude droit vers le genou gauche, puis inversement. Rotation lente. Cible les obliques."},
      {nom:'Planche',            series:4,reps:'45s',    repos:30, timed:true, timerDuration:45,desc:"Avant-bras et orteils. Corps aligné tête-pieds. Contracte abdos, fessiers, cuisses. Tiens sans bouger."},
      {nom:'Leg raises',         series:4,reps:'15',     repos:30, timed:false,desc:"Sur le dos, mains sous les fesses. Jambes tendues, monte à 90° puis redescends lentement. Ne pose pas les pieds."},
    ]},
  3:{nom:'Repos',emoji:'🌿',muscles:'Marche · Étirements',duree:'—',rest:true,exercices:[]},
  4:{nom:'Legs',emoji:'🦵',muscles:'Jambes · Fessiers',duree:'~55 min',
    exercices:[
      {nom:'Squats tempo lent', series:5,reps:'15',      repos:90, timed:false,desc:"Descends en 4s, tiens 2s en bas, remonte en 2s. Plus efficace qu'un squat sauté, zéro impact."},
      {nom:'Fentes',            series:4,reps:'12/jambe', repos:75, timed:false,desc:"Grand pas en avant, genou arrière vers le sol sans le poser. Genou avant ne dépasse pas la pointe du pied."},
      {nom:'Squats sumo',       series:4,reps:'15',      repos:75, timed:false,desc:"Pieds très écartés, orteils à 45°. Descends lentement, cuisses parallèles au sol. Cible l'intérieur des cuisses."},
      {nom:'Hip thrust',        series:4,reps:'20',      repos:75, timed:false,desc:"Dos sur le canapé, pieds à plat, genoux fléchis. Pousse les hanches vers le haut, contracte fort les fessiers."},
      {nom:'Mollets debout',    series:4,reps:'25',      repos:45, timed:false,desc:"Monte sur la pointe des pieds, tiens 1s, redescends lentement. Appuie-toi sur le mur si besoin."},
      {nom:'Wall sit',          series:3,reps:'45s',     repos:60, timed:true, timerDuration:45,desc:"Dos contre le mur, cuisses parallèles au sol. Tiens la position. Brûlure garantie dans les quadriceps."},
    ]},
  5:{nom:'Full Body',emoji:'⚡',muscles:'Cardio complet sans impact',duree:'~45 min',
    exercices:[
      {nom:'Burpees sans saut',    series:5,reps:'10',  repos:45, timed:false,desc:"Debout → accroupi → pompe → accroupi → extension debout sur la pointe des pieds. Zéro bruit, même intensité."},
      {nom:'Mountain climbers',    series:4,reps:'30s', repos:30, timed:true, timerDuration:30,desc:"En position de pompe haute, ramène alternativement les genoux vers la poitrine le plus vite possible."},
      {nom:'Squats tempo lent',    series:4,reps:'12',  repos:75, timed:false,desc:"Descends en 4s, tiens 2s en bas, remonte en 2s. Puissance maximale sans aucun impact."},
      {nom:'Pompes tempo négatif', series:4,reps:'8',   repos:90, timed:false,desc:"Descends en 5 secondes très lentement, remonte normalement. Détruit les pectoraux en profondeur."},
      {nom:'Gainage dynamique',    series:4,reps:'30s', repos:30, timed:true, timerDuration:30,desc:"En position de planche, monte une main vers l'épaule opposée, puis l'autre. Hanches stables."},
    ]},
  6:{nom:'Repos',emoji:'🌿',muscles:'Récupération complète',duree:'—',rest:true,exercices:[]},
  0:{nom:'Repos',emoji:'🌿',muscles:'Récupération complète',duree:'—',rest:true,exercices:[]},
};

let day,seance,exIdx=0,serieIdx=0,phase='prep';
let timerInt=null,timerVal=0,timerTotal=1;
let totalSer=0,startTime=0,nextDest={serie:0,ex:0};

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function initHome(){
  day=new Date().getDay(); seance=PROG[day];
  const sk=parseInt(localStorage.getItem('forma_streak')||'0');
  document.getElementById('streakTxt').textContent=`${sk} jour${sk>1?'s':''}`;

  document.getElementById('heroTitle').innerHTML=`${DAYS[day]}<br><em>${seance.nom}</em>`;
  document.getElementById('heroSub').textContent=seance.muscles;

  const strip=document.getElementById('weekStrip');
  const completedDays=JSON.parse(localStorage.getItem('forma_completed')||'[]');
  strip.innerHTML=DS.map((d,i)=>{
    const p=PROG[i],t=i===day;
    const done=completedDays.includes(i)&&!t;
    return`<div class="wday">
      <div class="wday-l">${d}</div>
      <div class="wdot${t?' today':''}${p.rest&&!t?' rest':''}${done?' completed':''}">
        ${done?'✓':t?'●':p.emoji}
      </div>
    </div>`;
  }).join('');

  document.getElementById('cIcon').textContent=seance.emoji;
  document.getElementById('cDur').textContent=seance.duree;
  document.getElementById('cCnt').textContent=`${seance.exercices.length} exercices`;
  document.getElementById('cTitle').textContent=seance.nom;
  document.getElementById('cMuscles').textContent=seance.muscles;
  document.getElementById('exList').innerHTML=seance.exercices.map((ex,i)=>
    `<div class="ex-row"><div class="ex-i">0${i+1}</div><div class="ex-bar"></div><div class="ex-n">${ex.nom}</div><div class="ex-v">${ex.series}×${ex.reps}</div></div>`
  ).join('');

  const btn=document.getElementById('btnStart');
  if(seance.rest){btn.className='btn-start rest';btn.textContent='Jour de repos 🌿';btn.onclick=null;}
  else{btn.className='btn-start';btn.textContent='Commencer la séance';btn.onclick=startWorkout;}
}

function startWorkout(){
  if(seance.rest)return;
  exIdx=0;serieIdx=0;phase='prep';totalSer=0;startTime=Date.now();
  show('workout');renderPhase();
}

function renderPhase(){
  const ex=seance.exercices[exIdx],total=seance.exercices.length;
  // Progress bar
  document.getElementById('progExName').textContent=ex.nom;
  document.getElementById('progFill').style.width=(exIdx/total*100)+'%';
  // Step dots
  document.getElementById('stepDots').innerHTML=Array.from({length:total},(_,i)=>{
    const cls=i<exIdx?'done-step':i===exIdx?'cur-step':'';
    return`<div class="step-dot ${cls}"></div>`;
  }).join('');

  const tag=document.getElementById('phaseTag'),txt=document.getElementById('phaseTxt');
  if(phase==='work'){tag.className='phase-tag pt-work';txt.textContent='En cours';}
  else if(phase==='rest'){tag.className='phase-tag pt-rest';txt.textContent='Repos';}
  else{tag.className='phase-tag pt-prep';txt.textContent='Prêt ?';}

  document.getElementById('exMeta').textContent=`Exercice ${exIdx+1} · Série ${Math.min(serieIdx+1,ex.series)}/${ex.series}`;
  document.getElementById('exBig').textContent=ex.nom;
  document.getElementById('descBox').textContent=ex.desc;
  document.getElementById('chipR').textContent=ex.reps;
  document.getElementById('chipS').textContent=ex.series;
  document.getElementById('chipP').textContent=ex.repos+'s';

  document.getElementById('sdots').innerHTML=Array.from({length:ex.series},(_,i)=>{
    const w=i<serieIdx?22:i===serieIdx?14:8;
    return`<div class="sdot${i<serieIdx?' done':i===serieIdx?' cur':''}" style="width:${w}px"></div>`;
  }).join('');

  const rp=document.getElementById('ringProg');
  if(phase==='prep'){
    clearCd();rp.style.stroke='rgba(242,240,232,0.2)';setRing(0.5);
    document.getElementById('ringNum').textContent='—';
    document.getElementById('ringTag').textContent='prêt ?';
    document.getElementById('btnAct').className='btn-act';
    document.getElementById('btnAct').textContent="C'est parti →";
    document.getElementById('nextBox').style.display='none';
  }else if(phase==='work'){
    rp.style.stroke='var(--cream)';
    if(ex.timed){startCd(ex.timerDuration,false,()=>{});}
    else{clearCd();setRing(1);document.getElementById('ringNum').textContent=ex.reps;document.getElementById('ringTag').textContent='reps';}
    document.getElementById('btnAct').className='btn-act';
    document.getElementById('btnAct').textContent='Série terminée ✓';
    document.getElementById('nextBox').style.display='none';
  }else{
    rp.style.stroke='#a8d4a0';
    document.getElementById('btnAct').className='btn-act rest-act';
    document.getElementById('btnAct').textContent='Passer le repos →';
    const nx=seance.exercices[nextDest.ex],nb=document.getElementById('nextBox');
    if(nx){
      document.getElementById('nextNm').textContent=nextDest.ex===exIdx?`${ex.nom} — Série ${nextDest.serie+1}/${ex.series}`:nx.nom;
      nb.style.display='flex';
    }else nb.style.display='none';
    startCd(ex.repos,true,()=>goNext(nextDest.serie,nextDest.ex));
  }
}

function setRing(r){document.getElementById('ringProg').style.strokeDashoffset=CIRC*(1-Math.max(0,Math.min(1,r)));}

function startCd(dur,isRest,onEnd){
  clearCd();timerVal=dur;timerTotal=dur;
  document.getElementById('ringNum').textContent=timerVal;
  document.getElementById('ringTag').textContent=isRest?'repos':'secondes';
  setRing(1);
  timerInt=setInterval(()=>{
    timerVal--;
    document.getElementById('ringNum').textContent=timerVal>=60?`${Math.floor(timerVal/60)}:${(timerVal%60).toString().padStart(2,'0')}`:timerVal;
    setRing(timerVal/timerTotal);
    if(timerVal<=0){clearCd();if(navigator.vibrate)navigator.vibrate([80,40,80]);setTimeout(onEnd,100);}
  },1000);
}
function clearCd(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

function handleAction(){
  const ex=seance.exercices[exIdx],total=seance.exercices.length;
  if(phase==='prep'){phase='work';renderPhase();return;}
  if(phase==='work'){
    clearCd();totalSer++;
    const ns=serieIdx+1;
    if(ns>=ex.series){const ne=exIdx+1;if(ne>=total)finishWorkout();else{nextDest={serie:0,ex:ne};serieIdx=ns;phase='rest';renderPhase();}}
    else{nextDest={serie:ns,ex:exIdx};serieIdx=ns;phase='rest';renderPhase();}
    return;
  }
  if(phase==='rest'){clearCd();goNext(nextDest.serie,nextDest.ex);}
}

function goNext(serie,ex){
  clearCd();
  if(ex>=seance.exercices.length){finishWorkout();return;}
  exIdx=ex;serieIdx=serie;phase='prep';renderPhase();
}
function quitWorkout(){clearCd();show('home');initHome();}

function finishWorkout(){
  clearCd();
  const elapsed=Math.round((Date.now()-startTime)/60000);
  const today=new Date().toDateString(),last=localStorage.getItem('forma_last')||'';
  if(last!==today){
    const s=parseInt(localStorage.getItem('forma_streak')||'0');
    localStorage.setItem('forma_streak',s+1);
    localStorage.setItem('forma_last',today);
    // Save completed day of week
    const completed=JSON.parse(localStorage.getItem('forma_completed')||'[]');
    if(!completed.includes(day)) completed.push(day);
    if(completed.length>7) completed.shift();
    localStorage.setItem('forma_completed',JSON.stringify(completed));
  }
  document.getElementById('fEx').textContent=seance.exercices.length;
  document.getElementById('fSer').textContent=totalSer;
  document.getElementById('fDur').textContent=(elapsed||1)+'min';
  document.getElementById('fSub').textContent=`${seance.nom} terminé. Récupère bien et reviens demain.`;
  show('finish');
}
function goHome(){show('home');initHome();}

initHome();
</script>

</body>
</html>
